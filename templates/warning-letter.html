<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{recordTitle}}</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 11pt; color: #111; line-height: 1.5; margin: 0; }
    .letter p { margin: 0 0 0.85em; }
    .letter .subject { margin-bottom: 1em; }
    .letter .observed { white-space: pre-wrap; margin: 0.5em 0 1em; padding-left: 0.5em; border-left: 3px solid #ccc; }
    .signature { margin-top: 1.5em; }
    .signature p { margin: 0 0 0.25em; }
    hr { border: none; border-top: 1px solid #ddd; margin: 1.25em 0; }
    .meta { color: #444; font-size: 9pt; }
  </style>
</head>
<body>
  <div class="letter">
{{LETTER_BODY}}
  </div>
  <hr />
  <p class="meta">Case record: {{recordTitle}} · Issued: {{issuedAt}} · PDF generated: {{generatedAt}}</p>
  <p class="meta">System-generated copy for the case file. Official process may require separate signed documentation.</p>
</body>
</html>
